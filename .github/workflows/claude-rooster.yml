name: Claude Rooster

on:
  schedule:
    - cron: '0 22 * * *'   # 06:00 SGT
    - cron: '0 3 * * *'  # 11:00 SGT
    - cron: '0 8 * * *'  # 16:00 SGT
    - cron: '0 13 * * *'  # 21:00 SGT
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Custom prompt to send to Claude.'
        required: false
        default: ''

env:
  # Default prompt sent to Claude on each scheduled run.
  # Approximately 26.1k tokens with Haiku model
  DEFAULT_PROMPT: "hi"

jobs:
  wake-claude:
    name: Wake Claude Code
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Call Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_MODEL: "claude-haiku-4-5"
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: 1
          CLAUDE_CODE_ALLOWED_TOOLS: "Read,Bash"
        run: |
          PROMPT="${{ github.event.inputs.prompt }}"
          if [ -z "$PROMPT" ]; then
            PROMPT="${{ env.DEFAULT_PROMPT }}"
          fi

          echo "Calling Claude Code..."

          if claude -p "$PROMPT" 2>&1 | tee /tmp/claude_output.log; then
            echo "Claude Code completed successfully."
            exit 0
          else
            # Check if the error is the expected "exceeded token maximum" error
            if grep -q "exceeded" /tmp/claude_output.log; then
              echo "Caught expected token limit error - ignoring and marking as passed."
              exit 0
            else
              echo "Unexpected error occurred."
              exit 1
            fi
          fi
